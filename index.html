<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener — CodeAlpha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f13; --card: #1a1a24; --border: #2a2a38;
      --accent: #6c63ff; --accent-hover: #5a52e0;
      --green: #22c55e; --red: #ef4444;
      --text: #e8e8f0; --muted: #7070a0;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .badge { background: var(--accent); color: white; font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    main { max-width: 720px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); margin-bottom: 40px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
    .input-row { display: flex; gap: 10px; }
    input[type="url"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px 18px; border-radius: 10px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    input[type="url"]:focus { border-color: var(--accent); }
    input[type="url"]::placeholder { color: var(--muted); }
    button { background: var(--accent); color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    button:hover { background: var(--accent-hover); }
    .result-box { display: none; margin-top: 20px; background: var(--bg); border: 1px solid var(--green); border-radius: 10px; padding: 16px 18px; }
    .result-box.visible { display: flex; align-items: center; gap: 12px; }
    .result-box a { color: var(--green); font-weight: 600; flex: 1; text-decoration: none; word-break: break-all; }
    .copy-btn { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 8px 14px; font-size: 0.8rem; border-radius: 8px; }
    .copy-btn:hover { background: var(--green); color: white; }
    .error-box { display: none; margin-top: 16px; background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: var(--red); border-radius: 10px; padding: 12px 16px; font-size: 0.9rem; }
    .error-box.visible { display: block; }
    .section-title { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; font-weight: 700; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(108,99,255,0.05); }
    tbody td { padding: 12px 10px; font-size: 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .orig-url { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .short-link { color: var(--accent); font-weight: 600; text-decoration: none; }
    .short-link:hover { text-decoration: underline; }
    .clicks-badge { background: rgba(108,99,255,0.15); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .del-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; }
    .del-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }
    .empty-msg { text-align: center; color: var(--muted); padding: 30px; font-size: 0.9rem; }
    @media (max-width: 540px) { .input-row { flex-direction: column; } h1 { font-size: 1.6rem; } }
  </style>
</head>
<body>
<header>
  <div class="logo">⚡ ShortLink</div>
  <span class="badge">CodeAlpha</span>
</header>
<main>
  <h1>Shorten any <span>URL</span> instantly</h1>
  <p class="subtitle">Paste your long link below and get a clean, shareable short URL.</p>
  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com/your-very-long-url..." />
      <button onclick="shortenUrl()">Shorten</button>
    </div>
    <div class="result-box" id="resultBox">
      <a id="shortUrlLink" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copyUrl()">Copy</button>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>
  <div class="card">
    <div class="section-title">All Shortened URLs</div>
    <table>
      <thead>
        <tr><th>Short URL</th><th>Original URL</th><th>Clicks</th><th>Action</th></tr>
      </thead>
      <tbody id="urlTable">
        <tr><td colspan="4" class="empty-msg">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>
<script>
  const BASE = window.location.origin;
  async function shortenUrl() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');
    if (!url) return;
    resultBox.classList.remove('visible');
    errorBox.classList.remove('visible');
    try {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ originalUrl: url })
      });
      const data = await res.json();
      if (data.success) {
        const link = document.getElementById('shortUrlLink');
        link.href = data.shortUrl;
        link.textContent = data.shortUrl;
        resultBox.classList.add('visible');
        input.value = '';
        loadUrls();
      } else {
        errorBox.textContent = data.error;
        errorBox.classList.add('visible');
      }
    } catch(e) {
      errorBox.textContent = 'Something went wrong. Is the server running?';
      errorBox.classList.add('visible');
    }
  }
  function copyUrl() {
    const link = document.getElementById('shortUrlLink').textContent;
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
  async function loadUrls() {
    const table = document.getElementById('urlTable');
    try {
      const res = await fetch('/api/urls');
      const data = await res.json();
      if (!data.urls || data.urls.length === 0) {
        table.innerHTML = '<tr><td colspan="4" class="empty-msg">No URLs yet. Shorten your first link above!</td></tr>';
        return;
      }
      table.innerHTML = data.urls.map(row => `
        <tr>
          <td><a class="short-link" href="${BASE}/${row.short_code}" target="_blank">${BASE}/${row.short_code}</a></td>
          <td><div class="orig-url" title="${row.original_url}">${row.original_url}</div></td>
          <td><span class="clicks-badge">${row.clicks}</span></td>
          <td><button class="del-btn" onclick="deleteUrl('${row.short_code}')">Delete</button></td>
        </tr>
      `).join('');
    } catch {
      table.innerHTML = '<tr><td colspan="4" class="empty-msg">Could not load URLs.</td></tr>';
    }
  }
  async function deleteUrl(code) {
    if (!confirm('Delete this URL?')) return;
    await fetch('/api/urls/' + code, { method: 'DELETE' });
    loadUrls();
  }
  document.getElementById('urlInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') shortenUrl();
  });
  loadUrls();
</script>
</body>
</html>
